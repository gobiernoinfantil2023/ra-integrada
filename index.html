<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Realidad Aumentada - Muestra de Arte</title>
    <!-- Librerías necesarias -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <!-- Escena de A-Frame con MindAR -->
    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >
      <!-- Cámara fija (necesaria para tracking) -->
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Target 0: generaciones -->
      <a-entity mindar-image-target="targetIndex: 0">
        <a-plane
          width="1.6"
          height="0.9"
          position="0 0 -0.5"
          material="src: url(./generaciones.mp4); shader: flat; side: double"
          video="autoplay: true; loop: true"
        ></a-plane>
      </a-entity>

      <!-- Target 1: abuela -->
      <a-entity mindar-image-target="targetIndex: 1">
        <a-plane
          width="1.6"
          height="0.9"
          position="0 0 -0.5"
          material="src: url(./abuela.mp4); shader: flat; side: double"
          video="autoplay: true; loop: true"
        ></a-plane>
      </a-entity>

      <!-- Target 2: adn -->
      <a-entity mindar-image-target="targetIndex: 2">
        <a-plane
          width="1.6"
          height="0.9"
          position="0 0 -0.5"
          material="src: url(./adn.mp4); shader: flat; side: double"
          video="autoplay: true; loop: true"
        ></a-plane>
      </a-entity>

      <!-- Target 3: ciencia -->
      <a-entity mindar-image-target="targetIndex: 3">
        <a-plane
          width="1.6"
          height="0.9"
          position="0 0 -0.5"
          material="src: url(./ciencia.mp4); shader: flat; side: double"
          video="autoplay: true; loop: true"
        ></a-plane>
      </a-entity>

      <!-- Target 4: familia -->
      <a-entity mindar-image-target="targetIndex: 4">
        <a-plane
          width="1.6"
          height="0.9"

          video="autoplay: true; loop: true"
        ></a-plane>
      </a-entity>

      <!-- Target 5: garabatos -->
      <a-entity mindar-image-target="targetIndex: 5">

          width="1.6"

          video="autoplay: true; loop: true"
        ></a-plane>
      </a-entity>

      <!-- Target 6: hermanas -->

          video="autoplay: true; loop: true"
        ></a-plane>
      </a-entity>

      <!-- Target 7: hermanos -->
      <a-entity mindar-image-target="targetIndex: 7">
        <a-plane
          width="1.6"
          height="0.9"
          position="0 0 -0.5"
          material="src: url(./hermanos.mp4); shader: flat; side: double"
          video="autoplay: true; loop: true"
        ></a-plane>
      </a-entity>

      <!-- Target 8: juicio -->
      <a-entity mindar-image-target="targetIndex: 8">
        <a-plane
          width="1.6"

          video="autoplay: true; loop: true"
        ></a-plane>
      </a-entity>

      <!-- Target 9: regalo -->

        ></a-plane>
      </a-entity>

      <!-- Target 10: resolucion -->

        <a-plane
          width="1.6"
          height="0.9"
          position="0 0 -0.5"
          material="src: url(./resolucion.mp4); shader: flat; side: double"
          video="autoplay: true; loop: true"
        ></a-plane>
      </a-entity>
    </a-scene>
  </body>
</html>
